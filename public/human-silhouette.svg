<svg width="200" height="400" viewBox="0 0 200 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Head -->
  <ellipse cx="100" cy="40" rx="25" ry="30" fill="#e5e7eb" stroke="#374151" stroke-width="2"/>

  <!-- Neck -->
  <rect x="85" y="65" width="30" height="15" fill="#e5e7eb" stroke="#374151" stroke-width="2"/>

  <!-- Torso -->
  <path d="M 75 80 Q 75 90 85 90 L 115 90 Q 125 90 125 80 L 125 180 Q 125 190 115 190 L 85 190 Q 75 190 75 180 Z" fill="#e5e7eb" stroke="#374151" stroke-width="2"/>

  <!-- Left Arm -->
  <rect x="50" y="90" width="25" height="80" fill="#e5e7eb" stroke="#374151" stroke-width="2"/>
  <ellipse cx="62.5" cy="170" rx="12.5" ry="10" fill="#e5e7eb" stroke="#374151" stroke-width="2"/>

  <!-- Right Arm -->
  <rect x="125" y="90" width="25" height="80" fill="#e5e7eb" stroke="#374151" stroke-width="2"/>
  <ellipse cx="137.5" cy="170" rx="12.5" ry="10" fill="#e5e7eb" stroke="#374151" stroke-width="2"/>

  <!-- Left Leg -->
  <rect x="75" y="190" width="20" height="100" fill="#e5e7eb" stroke="#374151" stroke-width="2"/>
  <ellipse cx="85" cy="290" rx="10" ry="8" fill="#e5e7eb" stroke="#374151" stroke-width="2"/>

  <!-- Right Leg -->
  <rect x="105" y="190" width="20" height="100" fill="#e5e7eb" stroke="#374151" stroke-width="2"/>
  <ellipse cx="115" cy="290" rx="10" ry="8" fill="#e5e7eb" stroke="#374151" stroke-width="2"/>

  <!-- Data Points -->
  <circle cx="100" cy="120" r="4" fill="#ef4444" class="left-arm-point"/>
  <circle cx="100" cy="160" r="4" fill="#ef4444" class="right-arm-point"/>
  <circle cx="90" cy="220" r="4" fill="#3b82f6" class="left-leg-point"/>
  <circle cx="110" cy="220" r="4" fill="#3b82f6" class="right-leg-point"/>
  <circle cx="100" cy="250" r="4" fill="#10b981" class="torso-point"/>
</svg>